<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>隐私政策 - 游译者 GameLingo</title>
    <style>
      body { margin: 0; font-family: "Microsoft YaHei", sans-serif; background: #0c1830; color: #eff7ff; }
      .wrap { width: min(900px, 92vw); margin: 0 auto; padding: 24px 0 40px; }
      .card { background: #132540; border: 1px solid #2f4f79; border-radius: 12px; padding: 14px; margin-bottom: 12px; }
      h1, h2 { margin: 0 0 8px; }
      p, li { color: #b4cde2; line-height: 1.75; }
      a { color: #9edcff; text-decoration: none; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <a href="./index.html">返回首页</a>
      <div class="card">
        <h1>隐私政策</h1>
        <p>我们仅收集提供服务所需的最小数据：账号信息、订阅状态、调用次数和错误日志。</p>
      </div>
      <div class="card">
        <h2>我们收集的数据</h2>
        <ul>
          <li>账号：邮箱、加密后的密码</li>
          <li>服务数据：翻译请求计数、订阅信息</li>
          <li>诊断数据：错误日志（可选）</li>
        </ul>
      </div>
      <div class="card">
        <h2>数据用途</h2>
        <ul>
          <li>身份验证与防滥用</li>
          <li>免费/会员权限判定</li>
          <li>提升翻译稳定性与性能</li>
        </ul>
      </div>
    </main>
  </body>
</html>
